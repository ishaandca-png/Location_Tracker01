            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            const accuracy = pos.coords.accuracy;

            // Update status text
            document.getElementById('status').innerText = `Lat: ${lat.toFixed(4)}, Lng: ${lng.toFixed(4)} (Accurate to ${Math.round(accuracy)}m)`;

            // If marker doesn't exist, create it. Otherwise, move it.
            if (!marker) {
                marker = L.marker([lat, lng]).addTo(map);
                circle = L.circle([lat, lng], { radius: accuracy }).addTo(map);
                map.setView([lat, lng], 16); // Zoom in on first find
            } else {
                marker.setLatLng([lat, lng]);
                circle.setLatLng([lat, lng]);
                circle.setRadius(accuracy);
                map.panTo([lat, lng]); // Smoothly follow the user
            }
        }

        function error(err) {
            console.warn(`ERROR(${err.code}): ${err.message}`);
            document.getElementById('status').innerText = "Error: " + err.message;
        }

        document.getElementById('startBtn').addEventListener('click', startTracking);
