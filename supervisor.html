<!DOCTYPE html>
<html>
<head>
    <title>Supervisor View - Live Tracking</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
    /* Force the map to fill the entire screen */
    html, body {
        height: 100%;
        margin: 0;
    }
    #map {
        height: 100vh; /* 'vh' means 100% of the visible screen height */
        width: 100%;
    }
</style>
</head>
<body>

    <div id="info-box">
        <strong>Tracking: User 1</strong><br>
        <span id="last-update">Waiting for data...</span>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        // 1. YOUR FIREBASE CONFIG (PASTE YOURS HERE)
        const firebaseConfig = {
  apiKey: "AIzaSyBEhnGY-1nQ9lM6dcCTdhvZBE5KcrC75iQ",
  authDomain: "staff-tracker-20023.firebaseapp.com",
  databaseURL: "https://staff-tracker-20023-default-rtdb.firebaseio.com",
  projectId: "staff-tracker-20023",
  storageBucket: "staff-tracker-20023.firebasestorage.app",
  messagingSenderId: "661387365775",
  appId: "1:661387365775:web:6a0a36c68a18791e9dcffa",
  measurementId: "G-LC55HS8XEP"
};

        // 2. Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 3. Setup the Map
        const map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let supervisorMarker;

        // 4. LISTEN for changes in the cloud
        db.ref('live_location/user_1').on('value', (snapshot) => {
            const data = snapshot.val();
            
            if (data) {
                const { lat, lng, timestamp } = data;
                const date = new Date(timestamp).toLocaleTimeString();

                document.getElementById('last-update').innerText = "Last seen: " + date;

                // Move or Create the marker
                if (!supervisorMarker) {
                    supervisorMarker = L.marker([lat, lng]).addTo(map);
                    map.setView([lat, lng], 16); // Zoom in the first time data arrives
                } else {
                    supervisorMarker.setLatLng([lat, lng]);
                    map.panTo([lat, lng]); // Follow the user smoothly
                }
            }
        });
    </script>
</body>
</html>
