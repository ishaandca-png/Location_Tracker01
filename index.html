<html>
<head>

    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background: #f4f4f9; }
        #map { height: 60vh; width: 100%; border-bottom: 2px solid #ccc; }
        .ui { padding: 20px; text-align: center; }
        
        button { 
    width: 100%; padding: 18px; font-size: 1.2rem; border: none; 
    border-radius: 12px; background: #007bff; color: white; font-weight: bold;
    cursor: pointer; transition: 0.3s;
}
/* This class will be added when tracking is active */
.active-btn { background: #dc3545 !important; }
        button:active { transform: scale(0.98); }
        #log { margin-top: 15px; font-size: 0.9rem; color: #555; line-height: 1.4; }
        .error { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>

<div id="map"></div>
<div class="ui">
    <button id="mainBtn" onclick="toggleTracking()">START TRACKING</button>
    <div id="log">Status: Ready</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>

<script>

    const firebaseConfig = {
        apiKey: "AIzaSyBEhnGY-1nQ9lM6dcCTdhvZBE5KcrC75iQ",
        databaseURL: "https://staff-tracker-20023-default-rtdb.firebaseio.com",
        projectId: "staff-tracker-20023"
    };

    let map, marker, db;
    const logEl = document.getElementById('log');
    const btn = document.getElementById('mainBtn');

    function updateLog(msg, isError = false) {
        logEl.innerHTML = isError ? `<span class="error">❌ ${msg}</span>` : `📡 ${msg}`;
        console.log(msg);
    }

    function initTracker() {
        try {
            updateLog("Initializing Firebase...");
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            
            btn.innerText = "TRACKING LIVE";
            btn.style.background = "#28a745";

            // Initialize Map
            if (!map) {
                map = L.map('map').setView([0, 0], 2);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            }

            startGPS();
        } catch (e) {
            updateLog("Firebase Init Failed: " + e.message, true);
        }
    }

    let watchId = null; 
let wakeLock = null;

// The main Toggle function
async function toggleTracking() {
    const btn = document.getElementById('mainBtn');
    
    if (watchId === null) {
        // --- STARTING ---
        btn.innerText = "STOP TRACKING";
        btn.classList.add('active-btn');
        
        // 1. Request Wake Lock (Prevents phone from sleeping)
        if ('wakeLock' in navigator) {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
            } catch (err) { console.log("WakeLock error: " + err.message); }
        }

        // 2. Start the GPS engine
        startGPS(); 
        updateLog("Tracking Started...");
    } else {
        // --- STOPPING ---
        btn.innerText = "START TRACKING";
        btn.classList.remove('active-btn');
        
        // 1. Kill the GPS engine
        navigator.geolocation.clearWatch(watchId);
        watchId = null;

        // 2. Release Wake Lock
        if (wakeLock !== null) {
            wakeLock.release();
            wakeLock = null;
        }

        updateLog("Tracking Stopped.");
    }
}

        const { latitude, longitude } = pos.coords;
        
        // Your Firebase Send Logic

    function startGPS() {
        if (!navigator.geolocation) {
            updateLog("GPS not supported by browser", true);
            return;
        }

        navigator.geolocation.watchPosition(
            (pos) => {
                const { latitude, longitude, accuracy } = pos.coords;
                updateLog(`Location found (Acc: ${Math.round(accuracy)}m)`);

                // Update Map
                if (!marker) {
                    marker = L.marker([latitude, longitude]).addTo(map);
                    map.setView([latitude, longitude], 17);
                } else {
                    marker.setLatLng([latitude, longitude]);
                }

                // Sync to Firebase
                db.ref('live_location/user_1').set({
                    lat: latitude,
                    lng: longitude,
                    time: Date.now()
                }).then(() => {
                    updateLog("Cloud Synced: " + new Date().toLocaleTimeString());
                }).catch(err => {
                    updateLog("Database Blocked: " + err.message, true);
                });
            },
            (err) => {
                let msg = "GPS Error: ";
                if (err.code === 1) msg += "Please enable Location Permissions.";
                if (err.code === 2) msg += "Satellite signal lost.";
                if (err.code === 3) msg += "Connection timeout.";
                updateLog(msg, true);
            },
            { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
        );
    }
</script>
