<!DOCTYPE html>
<html>
<head>
    <title>SUPERVISOR - Live Control</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #222; }
        #header { background: #333; color: white; padding: 15px; display: flex; justify-content: space-between; }
        #map { height: calc(100vh - 60px); width: 100%; background: #111; }
        #status-dot { height: 12px; width: 12px; background: red; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

<div id="header">
    <span><strong>LIVE:</strong> User 1</span>
    <span><span id="status-dot"></span> <span id="status-text">Offline</span></span>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBEhnGY-1nQ9lM6dcCTdhvZBE5KcrC75iQ",
        databaseURL: "https://staff-tracker-20023-default-rtdb.firebaseio.com",
        projectId: "staff-tracker-20023"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const map = L.map('map').setView([0, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let superMarker;
    const dot = document.getElementById('status-dot');
    const text = document.getElementById('status-text');

      const markers = {}; // An object to hold all active markers

    db.ref('live_location').on('value', (snapshot) => {
        const allUsers = snapshot.val();
    
        for (let id in allUsers) {
        const data = allUsers[id];
        
        // If this marker already exists, just move it
        if (markers[id]) {
            markers[id].setLatLng([data.lat, data.lng]);
        } 
        // If it's a new device, create a new marker
        else {
            markers[id] = L.marker([data.lat, data.lng])
                .addTo(map)
                .bindPopup("Device: " + id) // Clicks show the ID
                .openPopup();
        }
    }
});
        
        if (data) {
            const { lat, lng, time } = data;
            
            // Check if data is fresh (less than 30 seconds old)
            const isFresh = (Date.now() - time) < 30000;
            dot.style.background = isFresh ? "#28a745" : "#ffc107";
            text.innerText = isFresh ? "Live" : "Connection Lagging...";

            if (!superMarker) {
                superMarker = L.marker([lat, lng]).addTo(map);
                map.setView([lat, lng], 16);
            } else {
                superMarker.setLatLng([lat, lng]);
                map.panTo([lat, lng]);
            }
        } else {
            text.innerText = "No data in cloud";
        }
    }, (error) => {
        text.innerText = "Database Error!";
        console.error(error);
    });
</script>
</body>
</html>
